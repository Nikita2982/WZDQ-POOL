services:
  app:
    build: .
    container_name: dj-ai-bot-app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - telethon-session:/app/.sessions

  db:
    image: postgres:16
    container_name: dj-ai-bot-db
    environment:
      POSTGRES_DB: dj_ai_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dj-ai-bot-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
  telethon-session:
